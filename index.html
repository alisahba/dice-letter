<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Cubes</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
}

#start-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 16px 32px;
    font-size: 18px;
    background: white;
    color: black;
    border: none;
    border-radius: 8px;
}

#scene {
    width: 100vw;
    height: 100vh;
    perspective: 900px;
    display: none;
    position: relative;
}

.cube {
    width: 64px;
    height: 64px;
    position: absolute;
    transform-style: preserve-3d;
}

.face {
    position: absolute;
    width: 64px;
    height: 64px;
    background: black;
    color: white;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

.front  { transform: rotateY(0deg) translateZ(32px); }
.right  { transform: rotateY(90deg) translateZ(32px); }
.back   { transform: rotateY(180deg) translateZ(32px); }
.left   { transform: rotateY(-90deg) translateZ(32px); }
.top    { transform: rotateX(90deg) translateZ(32px); }
.bottom { transform: rotateX(-90deg) translateZ(32px); }
</style>
</head>

<body>

<button id="start-btn">Start</button>

<div id="scene">
    <div id="cube1" class="cube">
        <div class="face front">F</div>
        <div class="face right">U</div>
        <div class="face back">C</div>
        <div class="face left">K</div>
        <div class="face top">F</div>
        <div class="face bottom">K</div>
    </div>

    <div id="cube2" class="cube">
        <div class="face front">O</div>
        <div class="face right">F</div>
        <div class="face back">F</div>
        <div class="face left">F</div>
        <div class="face top">O</div>
        <div class="face bottom">O</div>
    </div>
</div>

<script>
const size = 64;

const cubes = [
    { el: cube1, x: 0, y: 0, vx: 0, vy: 0, rotX: 0, rotY: 0 },
    { el: cube2, x: 0, y: 0, vx: 0, vy: 0, rotX: 0, rotY: 0 }
];

const btn = document.getElementById("start-btn");
const scene = document.getElementById("scene");

let beta = 0, gamma = 0;

function handleOrientation(e) {
    beta = e.beta || 0;
    gamma = e.gamma || 0;
}

// spawn
function spawn() {
    cubes.forEach(c => {
        c.x = Math.random() * (window.innerWidth - size);
        c.y = Math.random() * (window.innerHeight - size);
        c.vx = 0;
        c.vy = 0;
        c.rotX = 0;
        c.rotY = 0;
    });
}

// collision
function collide(a, b) {
    let dx = (b.x + size/2) - (a.x + size/2);
    let dy = (b.y + size/2) - (a.y + size/2);
    let dist = Math.hypot(dx, dy);
    let minDist = size;

    if (dist < minDist) {
        let nx = dx / dist;
        let ny = dy / dist;

        let overlap = minDist - dist;
        a.x -= nx * overlap / 2;
        a.y -= ny * overlap / 2;
        b.x += nx * overlap / 2;
        b.y += ny * overlap / 2;

        let rvx = b.vx - a.vx;
        let rvy = b.vy - a.vy;

        let vel = rvx * nx + rvy * ny;
        if (vel > 0) return;

        let impulse = -(1.0 + 0.9) * vel / 2;

        let ix = impulse * nx;
        let iy = impulse * ny;

        a.vx -= ix;
        a.vy -= iy;
        b.vx += ix;
        b.vy += iy;
    }
}

// --- TOUCH INTERACTION ---
scene.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    const tx = touch.clientX;
    const ty = touch.clientY;

    cubes.forEach(c => {
        if (
            tx >= c.x && tx <= c.x + size &&
            ty >= c.y && ty <= c.y + size
        ) {
            // direction from touch to cube center
            let cx = c.x + size/2;
            let cy = c.y + size/2;

            let dx = cx - tx;
            let dy = cy - ty;

            let dist = Math.hypot(dx, dy) || 1;

            dx /= dist;
            dy /= dist;

            // strong impulse
            let force = 25;

            c.vx += dx * force + (Math.random() - 0.5) * 5;
            c.vy += dy * force + (Math.random() - 0.5) * 5;
        }
    });
});

function loop() {

    let tiltX = Math.max(-40, Math.min(40, gamma));
    let tiltY = Math.max(-40, Math.min(40, beta));

    const deadZone = 6;
    if (Math.abs(tiltX) < deadZone) tiltX = 0;
    if (Math.abs(tiltY) < deadZone) tiltY = 0;

    cubes.forEach(c => {

        c.vx += tiltX * 0.12;
        c.vy += tiltY * 0.12;

        c.vx *= 0.78;
        c.vy *= 0.78;

        if (Math.abs(c.vx) < 0.02) c.vx = 0;
        if (Math.abs(c.vy) < 0.02) c.vy = 0;

        c.x += c.vx;
        c.y += c.vy;

        // walls
        if (c.x < 0) { c.x = 0; c.vx *= -0.8; }
        if (c.x > window.innerWidth - size) {
            c.x = window.innerWidth - size;
            c.vx *= -0.8;
        }
        if (c.y < 0) { c.y = 0; c.vy *= -0.8; }
        if (c.y > window.innerHeight - size) {
            c.y = window.innerHeight - size;
            c.vy *= -0.8;
        }

        // rotation
        const rollFactor = 90 / size;
        c.rotY += c.vx * rollFactor;
        c.rotX -= c.vy * rollFactor;
    });

    collide(cubes[0], cubes[1]);

    cubes.forEach(c => {
        c.el.style.transform = `
            translate3d(${c.x}px, ${c.y}px, 0)
            rotateX(${c.rotX}deg)
            rotateY(${c.rotY}deg)
        `;
    });

    requestAnimationFrame(loop);
}

btn.onclick = () => {
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {

        DeviceOrientationEvent.requestPermission().then(res => {
            if (res === "granted") start();
        });

    } else {
        start();
    }
};

function start() {
    btn.style.display = "none";
    scene.style.display = "block";
    spawn();
    window.addEventListener("deviceorientation", handleOrientation);
    loop();
}
</script>

</body>
</html>
