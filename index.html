<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Cube Physics</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: white;
    font-family: monospace;
}

#start-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 40px;
    font-size: 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
}

#scene {
    width: 100vw;
    height: 100vh;
    perspective: 900px;
    display: none;
    justify-content: center;
    align-items: center;
}

#cube {
    width: 120px;
    height: 120px;
    position: relative;
    transform-style: preserve-3d;
}

.face {
    position: absolute;
    width: 120px;
    height: 120px;
    background: white;
    color: black;
    font-size: 60px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* faces */
.front  { transform: rotateY(0deg) translateZ(60px); }
.right  { transform: rotateY(90deg) translateZ(60px); }
.back   { transform: rotateY(180deg) translateZ(60px); }
.left   { transform: rotateY(-90deg) translateZ(60px); }
.top    { transform: rotateX(90deg) translateZ(60px); }
.bottom { transform: rotateX(-90deg) translateZ(60px); }
</style>
</head>

<body>

<button id="start-btn">Start</button>

<div id="scene">
    <div id="cube">
        <div class="face front">F</div>
        <div class="face right">U</div>
        <div class="face back">C</div>
        <div class="face left">K</div>
        <div class="face top">F</div>
        <div class="face bottom">K</div>
    </div>
</div>

<script>
const cube = document.getElementById("cube");
const btn = document.getElementById("start-btn");
const scene = document.getElementById("scene");

// position + velocity
let x = 0, y = 0;
let vx = 0, vy = 0;

// rotation
let rotX = 0, rotY = 0;

// gyro
let beta = 0, gamma = 0;

function handleOrientation(e) {
    beta = e.beta || 0;
    gamma = e.gamma || 0;
}

function loop() {

    let tiltX = Math.max(-40, Math.min(40, gamma));
    let tiltY = Math.max(-40, Math.min(40, beta));

    // --- STATIC FRICTION (real fix for sliding) ---
    const deadZone = 6;
    if (Math.abs(tiltX) < deadZone) tiltX = 0;
    if (Math.abs(tiltY) < deadZone) tiltY = 0;

    // acceleration (faster, more responsive)
    vx += tiltX * 0.12;
    vy += tiltY * 0.12;

    // strong floor friction
    vx *= 0.75;
    vy *= 0.75;

    // stop completely when slow
    if (Math.abs(vx) < 0.03) vx = 0;
    if (Math.abs(vy) < 0.03) vy = 0;

    x += vx;
    y += vy;

    // boundaries
    const maxX = window.innerWidth / 2 - 60;
    const maxY = window.innerHeight / 2 - 60;

    if (x > maxX) { x = maxX; vx *= -0.3; }
    if (x < -maxX) { x = -maxX; vx *= -0.3; }
    if (y > maxY) { y = maxY; vy *= -0.3; }
    if (y < -maxY) { y = -maxY; vy *= -0.3; }

    // --- TRUE ROLLING ---
    const rollFactor = 90 / 120;
    rotY += vx * rollFactor;
    rotX -= vy * rollFactor;

    // --- FACE RESISTANCE (subtle "edge friction") ---
    function resist(angle) {
        let nearest = Math.round(angle / 90) * 90;
        let diff = nearest - angle;
        return angle + diff * 0.05; // subtle, not snappy
    }

    // only apply when slow (feels like settling)
    if (Math.abs(vx) + Math.abs(vy) < 0.5) {
        rotX = resist(rotX);
        rotY = resist(rotY);
    }

    cube.style.transform = `
        translate3d(${x}px, ${y}px, 0)
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;

    requestAnimationFrame(loop);
}

// start
btn.onclick = () => {
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {

        DeviceOrientationEvent.requestPermission().then(res => {
            if (res === "granted") start();
        });

    } else {
        start();
    }
};

function start() {
    btn.style.display = "none";
    scene.style.display = "flex";
    window.addEventListener("deviceorientation", handleOrientation);
    loop();
}
</script>

</body>
</html>
