<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colliding Cubes</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
}

#start-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 16px 32px;
    font-size: 18px;
    background: white;
    color: black;
    border: none;
    border-radius: 8px;
}

#scene {
    width: 100vw;
    height: 100vh;
    perspective: 900px;
    display: none;
    position: relative;
}

/* cubes */
.cube {
    width: 64px;
    height: 64px;
    position: absolute;
    transform-style: preserve-3d;
}

.face {
    position: absolute;
    width: 64px;
    height: 64px;
    background: black;
    color: white;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

.front  { transform: rotateY(0deg) translateZ(32px); }
.right  { transform: rotateY(90deg) translateZ(32px); }
.back   { transform: rotateY(180deg) translateZ(32px); }
.left   { transform: rotateY(-90deg) translateZ(32px); }
.top    { transform: rotateX(90deg) translateZ(32px); }
.bottom { transform: rotateX(-90deg) translateZ(32px); }
</style>
</head>

<body>

<button id="start-btn">Start</button>

<div id="scene">

    <!-- cube 1 -->
    <div id="cube1" class="cube">
        <div class="face front">F</div>
        <div class="face right">U</div>
        <div class="face back">C</div>
        <div class="face left">K</div>
        <div class="face top">F</div>
        <div class="face bottom">K</div>
    </div>

    <!-- cube 2 -->
    <div id="cube2" class="cube">
        <div class="face front">O</div>
        <div class="face right">F</div>
        <div class="face back">F</div>
        <div class="face left">F</div>
        <div class="face top">O</div>
        <div class="face bottom">O</div>
    </div>

</div>

<script>
const cubes = [
    {
        el: document.getElementById("cube1"),
        x: 0, y: 0, vx: 0, vy: 0,
        rotX: 0, rotY: 0
    },
    {
        el: document.getElementById("cube2"),
        x: 0, y: 0, vx: 0, vy: 0,
        rotX: 0, rotY: 0
    }
];

const btn = document.getElementById("start-btn");
const scene = document.getElementById("scene");

let beta = 0, gamma = 0;

function handleOrientation(e) {
    beta = e.beta || 0;
    gamma = e.gamma || 0;
}

// --- RANDOM SPAWN ---
function spawnCubes() {
    const size = 64;

    cubes.forEach(c => {
        c.x = (Math.random() - 0.5) * (window.innerWidth - size);
        c.y = (Math.random() - 0.5) * (window.innerHeight - size);
        c.vx = 0;
        c.vy = 0;
        c.rotX = 0;
        c.rotY = 0;
    });
}

// --- COLLISION ---
function resolveCollision(a, b) {
    const size = 64;

    let dx = b.x - a.x;
    let dy = b.y - a.y;

    if (Math.abs(dx) < size && Math.abs(dy) < size) {

        // push apart
        let overlapX = size - Math.abs(dx);
        let overlapY = size - Math.abs(dy);

        if (overlapX < overlapY) {
            let push = overlapX / 2 * Math.sign(dx);
            a.x -= push;
            b.x += push;

            // bounce
            let temp = a.vx;
            a.vx = b.vx * 0.8;
            b.vx = temp * 0.8;

        } else {
            let push = overlapY / 2 * Math.sign(dy);
            a.y -= push;
            b.y += push;

            let temp = a.vy;
            a.vy = b.vy * 0.8;
            b.vy = temp * 0.8;
        }
    }
}

function loop() {

    let tiltX = Math.max(-40, Math.min(40, gamma));
    let tiltY = Math.max(-40, Math.min(40, beta));

    const deadZone = 6;
    if (Math.abs(tiltX) < deadZone) tiltX = 0;
    if (Math.abs(tiltY) < deadZone) tiltY = 0;

    cubes.forEach(c => {

        // movement
        c.vx += tiltX * 0.12;
        c.vy += tiltY * 0.12;

        c.vx *= 0.75;
        c.vy *= 0.75;

        if (Math.abs(c.vx) < 0.03) c.vx = 0;
        if (Math.abs(c.vy) < 0.03) c.vy = 0;

        c.x += c.vx;
        c.y += c.vy;

        // bounds
        const maxX = window.innerWidth / 2 - 32;
        const maxY = window.innerHeight / 2 - 32;

        if (c.x > maxX) { c.x = maxX; c.vx *= -0.3; }
        if (c.x < -maxX) { c.x = -maxX; c.vx *= -0.3; }
        if (c.y > maxY) { c.y = maxY; c.vy *= -0.3; }
        if (c.y < -maxY) { c.y = -maxY; c.vy *= -0.3; }

        // rotation
        const rollFactor = 90 / 64;
        c.rotY += c.vx * rollFactor;
        c.rotX -= c.vy * rollFactor;
    });

    // collision between cubes
    resolveCollision(cubes[0], cubes[1]);

    // render
    cubes.forEach(c => {
        c.el.style.transform = `
            translate3d(${c.x}px, ${c.y}px, 0)
            rotateX(${c.rotX}deg)
            rotateY(${c.rotY}deg)
        `;
    });

    requestAnimationFrame(loop);
}

// start
btn.onclick = () => {
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {

        DeviceOrientationEvent.requestPermission().then(res => {
            if (res === "granted") start();
        });

    } else {
        start();
    }
};

function start() {
    btn.style.display = "none";
    scene.style.display = "block";
    spawnCubes(); // random start
    window.addEventListener("deviceorientation", handleOrientation);
    loop();
}
</script>

</body>
</html>
